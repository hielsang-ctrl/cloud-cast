name: Deploy Website

on:
  push:
    branches:
      - main   # change if your branch is different

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build (if needed)
        run: |
          echo "Add build steps here if needed"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # change if your site is in /dist or /build

      - name: Deploy
        uses: actions/deploy-pages@v4
